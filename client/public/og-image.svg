<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="60" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent-grad)"/>

  <!-- Decorative glow -->
  <circle cx="1050" cy="80" r="300" fill="#3B82F6" opacity="0.06"/>
  <circle cx="-50" cy="500" r="250" fill="#06B6D4" opacity="0.05"/>

  <!-- Graduation cap icon -->
  <g transform="translate(100, 160)">
    <circle cx="40" cy="40" r="48" fill="#3B82F6" opacity="0.12"/>
    <path d="M15 38 L40 50 L65 38" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M40 50 L40 64" stroke="#3B82F6" stroke-width="5" stroke-linecap="round"/>
    <path d="M22 58 v16 q18 10 36 0 v-16" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  </g>

  <!-- Main Title -->
  <text x="140" y="240" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="900" fill="url(#title-grad)" letter-spacing="-1">Metierium</text>

  <!-- Subtitle -->
  <text x="140" y="290" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#94A3B8" font-weight="500">Préparez vos examens de certification</text>
  <text x="140" y="322" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#64748B">Électricien · Plombier · Soudeur · HVAC · et 12 autres métiers</text>

  <!-- Trade pills -->
  <rect x="140" y="350" width="110" height="34" rx="17" fill="#3B82F6" opacity="0.15"/>
  <text x="195" y="372" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#60A5FA" text-anchor="middle" font-weight="700">CMEQ</text>

  <rect x="262" y="350" width="115" height="34" rx="17" fill="#06B6D4" opacity="0.15"/>
  <text x="319" y="372" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#22D3EE" text-anchor="middle" font-weight="700">CMMTQ</text>

  <rect x="389" y="350" width="110" height="34" rx="17" fill="#8B5CF6" opacity="0.15"/>
  <text x="444" y="372" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#A78BFA" text-anchor="middle" font-weight="700">QBQ</text>

  <rect x="511" y="350" width="120" height="34" rx="17" fill="#F59E0B" opacity="0.15"/>
  <text x="571" y="372" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#FBBF24" text-anchor="middle" font-weight="700">ACQ</text>

  <!-- Features row -->
  <g transform="translate(140, 420)">
    <circle cx="12" cy="8" r="5" fill="#22C55E"/>
    <text x="24" y="13" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#94A3B8">1 800+ questions d'entraînement</text>
  </g>
  <g transform="translate(140, 450)">
    <circle cx="12" cy="8" r="5" fill="#22C55E"/>
    <text x="24" y="13" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#94A3B8">Théorie complète et Tuteur IA</text>
  </g>
  <g transform="translate(140, 480)">
    <circle cx="12" cy="8" r="5" fill="#22C55E"/>
    <text x="24" y="13" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#94A3B8">Examens blancs chronométrés</text>
  </g>

  <!-- URL -->
  <text x="140" y="550" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#3B82F6" font-weight="600">metierium.com</text>

  <!-- Right side decorative elements -->
  <g transform="translate(820, 160)" opacity="0.08">
    <rect x="0" y="0" width="280" height="350" rx="16" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <rect x="20" y="20" width="240" height="30" rx="6" fill="#3B82F6"/>
    <rect x="20" y="70" width="240" height="8" rx="4" fill="#3B82F6" opacity="0.3"/>
    <rect x="20" y="90" width="240" height="8" rx="4" fill="#3B82F6" opacity="0.3"/>
    <rect x="20" y="110" width="240" height="8" rx="4" fill="#3B82F6" opacity="0.3"/>
    <circle cx="260" cy="300" r="8" fill="#22C55E"/>
    <circle cx="237" cy="300" r="8" fill="#22C55E" opacity="0.5"/>
    <circle cx="214" cy="300" r="8" fill="#EF4444"/>
    <circle cx="191" cy="300" r="8" fill="#EF4444" opacity="0.5"/>
  </g>
</svg>
