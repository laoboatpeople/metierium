# ─── Certification Québec — Nginx configuration (HTTP only for certbot) ─────────────

# API upstream
upstream certquebec_api {
    server 127.0.0.1:4006;
}

# Client upstream
upstream certquebec_client {
    server 127.0.0.1:3006;
}

server {
    listen 80;
    server_name certificationquebec.com www.certificationquebec.com;

    # ─── API ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://certquebec_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── Health check ────────────────────────────────────
    location /health {
        proxy_pass http://certquebec_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Client ──────────────────────────────────────────
    location / {
        proxy_pass http://certquebec_client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
