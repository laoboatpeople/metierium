# ─── Metierium — Nginx configuration ─────────────

# API upstream
upstream metierium_api {
    server 127.0.0.1:4006;
}

# Client upstream
upstream metierium_client {
    server 127.0.0.1:3006;
}

server {
    listen 80;
    server_name metierium.com www.metierium.com;

    # Redirect to HTTPS (certbot s'occupe de ça)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name metierium.com www.metierium.com;

    # SSL — certbot remplira ça
    ssl_certificate /etc/letsencrypt/live/metierium.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metierium.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── API ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://metierium_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for AI requests
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── Health check ────────────────────────────────────
    location /health {
        proxy_pass http://metierium_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Client ──────────────────────────────────────────
    location / {
        proxy_pass http://metierium_client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
